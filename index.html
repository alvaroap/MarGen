<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
  <title>MarGen</title>

  <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MarGen">
  <meta name="theme-color" content="#0D0D55">

  <!-- Favicon SVG inline -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='180' height='180' rx='40' fill='%230D0D55'/%3E%3Ccircle cx='148' cy='42' r='68' fill='%23D9F203'/%3E%3Ccircle cx='30' cy='155' r='32' fill='%235271FF' opacity='.6'/%3E%3Ccircle cx='90' cy='95' r='52' fill='%230D0D55'/%3E%3Crect x='78' y='84' width='24' height='4' rx='2' fill='%23fff'/%3E%3Crect x='88' y='74' width='4' height='24' rx='2' fill='%23fff'/%3E%3C/svg%3E">

  <!-- Apple Touch Icon (iPhone) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='180' height='180' fill='%230D0D55'/%3E%3Ccircle cx='148' cy='42' r='68' fill='%23D9F203'/%3E%3Ccircle cx='30' cy='155' r='32' fill='%235271FF' opacity='.6'/%3E%3Ccircle cx='90' cy='95' r='52' fill='%230D0D55'/%3E%3Crect x='78' y='84' width='24' height='4' rx='2' fill='%23fff'/%3E%3Crect x='88' y='74' width='4' height='24' rx='2' fill='%23fff'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ── TOKENS ── */
    :root {
      --navy:        #0D0D55;
      --blue:        #5271FF;
      --pink:        #E8446A;
      --lime:        #D9F203;

      --navy-dark:   #06063A;
      --navy-light:  #3D3D8A;
      --navy-pale:   #7070B8;
      --blue-dark:   #2E50E8;
      --blue-light:  #8FA4FF;
      --blue-pale:   #C5D0FF;
      --pink-light:  #FDB5C4;
      --pink-pale:   #FFE0E7;
      --lime-dark:   #9DB800;
      --lime-light:  #E8F96B;
      --lime-pale:   #F4FCA8;

      --bg-app:      #F4F4EF;
      --bg-card:     #FFFFFF;
      --bg-input:    #ECECЕ8;
      --bg-muted:    #F0F0EB;

      --text:        #0D0D55;
      --text-sec:    #4A4A7A;
      --text-muted:  #9494B8;
      --text-inv:    #FFFFFF;

      --border:      #E2E2DC;
      --border-str:  #C8C8C0;

      --shadow-card: 0 2px 8px rgba(13,13,85,0.07);
      --shadow-md:   0 6px 20px rgba(13,13,85,0.11);
      --shadow-lg:   0 12px 32px rgba(13,13,85,0.14);
      --shadow-modal:0 -4px 40px rgba(13,13,85,0.15);

      --font:        'Plus Jakarta Sans', sans-serif;
      --fw-r: 400; --fw-m: 500; --fw-s: 600; --fw-b: 700;

      --r-sm:   0.5rem;
      --r-md:   1rem;
      --r-lg:   1.5rem;
      --r-xl:   2rem;
      --r-full: 9999px;

      --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);

      --app-w: 430px;
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overscroll-behavior: none;
    }
    body {
      font-family: var(--font);
      background: #18181C;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    /* ── SHELL ── */
    #root { width: 100%; max-width: var(--app-w); height: 100vh; height: 100dvh; }

    .app-shell {
      background: var(--bg-app);
      height: 100vh;
      height: 100dvh;
      max-width: var(--app-w);
      margin: 0 auto;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* En pantallas anchas (tablet/desktop) mostramos como app card */
    @media (min-width: 500px) {
      body { padding: 2rem 0 4rem; align-items: flex-start; background: #18181C; }
      #root { height: auto; }
      .app-shell {
        height: calc(100vh - 6rem);
        border-radius: 2.5rem;
        box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      }
    }

    /* ── HEADER ── */
    .header {
      background: var(--bg-card);
      padding: 1.5rem 1.5rem 1.25rem;
      padding-top: calc(1.5rem + env(safe-area-inset-top));
      border-radius: 0 0 var(--r-xl) var(--r-xl);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    /* Selector de año — centrado */
    .year-selector {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
    .year-pill {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      cursor: pointer;
      user-select: none;
      padding: 0.5rem 0.75rem 0.5rem 1.5rem;
      border-radius: var(--r-full);
      background: var(--bg-app);
      transition: background 150ms ease;
    }
    .year-pill:hover  { background: var(--border); }
    .year-pill:active { background: var(--border-str); }

    .year-number {
      font-size: 2rem;
      font-weight: var(--fw-b);
      color: var(--text);
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .year-chevron {
      color: var(--text-muted);
      transition: transform 250ms var(--ease-out);
      margin-top: 2px;
    }
    .year-chevron.open { transform: rotate(180deg); }

    /* Dropdown años */
    .year-dropdown {
      position: absolute;
      top: calc(100% + 0.5rem);
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-card);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      overflow: hidden;
      z-index: 100;
      min-width: 9rem;
      animation: dropIn 200ms var(--ease-out) both;
    }
    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-8px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .year-option {
      padding: 0.875rem 1.25rem;
      font-size: 1rem;
      font-weight: var(--fw-s);
      color: var(--text-sec);
      cursor: pointer;
      transition: background 100ms ease, color 100ms ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .year-option:hover  { background: var(--bg-muted); color: var(--text); }
    .year-option.active { color: var(--blue); font-weight: var(--fw-b); }
    .year-option + .year-option { border-top: 1px solid var(--border); }
    .year-check { color: var(--blue); }

    /* Header actions */
    .header-actions { display: flex; align-items: center; gap: 0.5rem; }

    .icon-btn {
      width: 2.5rem; height: 2.5rem;
      border-radius: var(--r-md);
      background: var(--bg-app);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 150ms ease;
      flex-shrink: 0;
    }
    .icon-btn:hover  { background: var(--border); color: var(--text-sec); }
    .icon-btn:active { transform: scale(0.95); }
    .icon-btn.success {
      background: var(--lime);
      border-color: var(--lime);
      color: var(--navy);
    }
    .icon-btn svg { width: 18px; height: 18px; }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      padding: 1.25rem 1.25rem 7rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow-y: auto;
    }
    .content.content-welcome {
      padding: 0;
      overflow: hidden;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      height: 100%;
    }

    /* ── BUDGET CARD ── */
    .budget-card {
      border-radius: var(--r-lg);
      padding: 1rem 1rem 1rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.875rem;
      box-shadow: var(--shadow-card);
      cursor: pointer;
      transition: transform 150ms var(--ease-out), box-shadow 150ms ease;
      -webkit-tap-highlight-color: transparent;
    }
    .budget-card:active {
      transform: scale(0.985);
      box-shadow: var(--shadow-md);
    }

    /* Contenedor de icono */
    .card-icon {
      width: 2.75rem; height: 2.75rem;
      border-radius: var(--r-md);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .card-icon svg { width: 20px; height: 20px; }
    .card-icon i { font-size: 20px; line-height: 1; display: block; }

    /* Icono sobre fondo oscuro */
    .icon-on-dark {
      background: rgba(255,255,255,0.20);
      color: var(--text-inv);
    }
    /* Icono sobre fondo claro */
    .icon-on-light {
      background: rgba(13,13,85,0.10);
      color: var(--navy);
    }

    .card-body { flex: 1; min-width: 0; }
    .card-name {
      font-size: 1.25rem;
      line-height: 1;
      margin-bottom: 0.175rem;
    }
    .card-sub {
      font-size: 0.75rem;
      opacity: 0.65;
    }
    .card-progress-bg {
      height: 0.2rem;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 0.4rem;
    }
    .card-progress-fill { height: 100%; border-radius: 999px; }

    /* Texto e icono según contraste del fondo */
    .on-dark .card-name,
    .on-dark .card-amount { color: var(--text-inv); }
    .on-dark .card-sub    { color: var(--text-inv); }
    .on-dark .card-progress-bg  { background: rgba(255,255,255,0.20); }
    .on-dark .card-progress-fill{ background: rgba(255,255,255,0.75); }
    .on-dark .card-edit   { background: rgba(255,255,255,0.20); color: rgba(255,255,255,0.9); }

    .on-light .card-name,
    .on-light .card-amount { color: var(--navy); }
    .on-light .card-sub    { color: var(--navy); }
    .on-light .card-progress-bg  { background: rgba(13,13,85,0.13); }
    .on-light .card-progress-fill{ background: rgba(13,13,85,0.40); }
    .on-light .card-edit  { background: rgba(13,13,85,0.10); color: rgba(13,13,85,0.7); }

    .card-right {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 0.5rem;
    }
    .card-amount {
      font-size: 1.2rem; letter-spacing: -0.02em; white-space: nowrap;
    }
    .card-edit {
      width: 2rem; height: 2rem;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--r-full);
      border: none; box-shadow: none;
      transition: opacity 150ms ease;
      cursor: pointer; flex-shrink: 0;
    }
    .card-edit:hover { opacity: 0.8; }
    .card-edit svg { width: 14px; height: 14px; }

    /* ── ESTADO VACÍO ── */
    .empty-state {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 0.75rem;
    }
    .empty-icon {
      width: 4rem; height: 4rem;
      border-radius: var(--r-xl);
      background: var(--bg-card);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      box-shadow: var(--shadow-card);
      margin-bottom: 0.5rem;
    }
    .empty-icon svg { width: 28px; height: 28px; }
    .empty-title {
      font-size: 1rem; font-weight: var(--fw-b);
      color: var(--text); letter-spacing: -0.02em;
    }
    .empty-sub {
      font-size: 0.8125rem; font-weight: var(--fw-m);
      color: var(--text-muted); line-height: 1.5;
      max-width: 18rem;
    }

    /* ── FOOTER ── */
    .footer {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: var(--app-w);
      padding: 1.25rem 1.5rem calc(2rem + env(safe-area-inset-bottom));
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 0.375rem;
      background: linear-gradient(to top, var(--bg-app) 70%, transparent);
      pointer-events: none;
    }
    .btn-add {
      width: 4.5rem; height: 4.5rem;
      border-radius: var(--r-full);
      background: var(--navy);
      color: var(--text-inv);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-md);
      transition: transform 200ms var(--ease-spring), box-shadow 200ms ease;
      pointer-events: all;
    }
    .btn-add:hover  { transform: scale(1.06); box-shadow: var(--shadow-lg); }
    .btn-add:active { transform: scale(0.94); }
    .btn-add svg { width: 22px; height: 22px; }
    .btn-add-label {
      font-size: 0.5625rem; font-weight: var(--fw-b);
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-muted);
      pointer-events: none;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(13,13,85,0.35);
      backdrop-filter: blur(4px);
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn 250ms ease both;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-sheet {
      background: var(--bg-card);
      border-radius: var(--r-xl) var(--r-xl) 0 0;
      width: 100%; max-width: var(--app-w);
      box-shadow: var(--shadow-modal);
      animation: slideUp 350ms var(--ease-out) both;
      max-height: 92vh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 1.5rem 1rem;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .modal-title {
      font-size: 1.5rem;
      color: var(--text); letter-spacing: -0.03em;
    }
    .modal-close {
      width: 2rem; height: 2rem;
      border-radius: var(--r-full);
      background: var(--bg-muted);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      transition: background 150ms ease; flex-shrink: 0;
    }
    .modal-close:hover { background: var(--border); }
    .modal-close svg { width: 14px; height: 14px; }

    .modal-content {
      flex: 1; overflow-y: auto;
      padding: 1.25rem 1.5rem;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .modal-footer {
      flex-shrink: 0;
      padding: 1rem 1.5rem 2.5rem;
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 0.625rem;
    }
    .modal-footer .btn { margin: 0; }

    /* Form fields */
    .field { margin-bottom: 1rem; }
    .field-label {
      font-size: 0.5625rem; font-weight: var(--fw-b);
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 0.375rem;
      display: block;
    }
    .field-input {
      width: 100%;
      background: var(--bg-muted);
      border: 1.5px solid transparent;
      border-radius: var(--r-md);
      padding: 0.875rem 1rem;
      font-family: var(--font);
      font-size: 0.9375rem;
      color: var(--text);
      outline: none;
      transition: border-color 150ms ease, background 150ms ease;
    }
    .field-input::placeholder { color: var(--text-muted); }
    .field-input:focus {
      border-color: var(--blue);
      background: var(--bg-card);
    }

    /* Color picker */
    .color-label {
      font-size: 0.5625rem; font-weight: var(--fw-b);
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 0.625rem;
      display: block;
    }
    .color-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .color-dot {
      aspect-ratio: 1;
      border-radius: var(--r-full);
      cursor: pointer;
      transition: transform 150ms var(--ease-spring);
      position: relative;
      border: none;
    }
    .color-dot:hover { transform: scale(1.15); }
    .color-dot.selected::after {
      content: '';
      position: absolute; inset: -3px;
      border-radius: var(--r-full);
      border: 2px solid var(--navy);
    }

    /* Icon picker */
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      max-height: 14rem;
      overflow-y: auto;
    }
    .icon-opt {
      aspect-ratio: 1;
      border-radius: var(--r-md);
      background: var(--bg-muted);
      border: 1.5px solid transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--text-sec);
      transition: all 150ms ease;
    }
    .icon-opt:hover { background: var(--border); }
    .icon-opt.selected {
      background: var(--navy);
      border-color: var(--navy);
      color: var(--text-inv);
    }
    .icon-opt svg { width: 20px; height: 20px; }

    /* Botones de acción */
    .btn {
      width: 100%; border: none; cursor: pointer;
      font-family: var(--font); font-weight: var(--fw-b);
      font-size: 0.75rem; letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 1rem;
      border-radius: var(--r-full);
      transition: transform 150ms ease, opacity 150ms ease;
    }
    .btn:active { transform: scale(0.98); opacity: 0.9; }
    .btn-primary   { background: var(--blue); color: var(--text-inv); }
    .btn-secondary { background: var(--lime); color: var(--navy); margin-top: 0.625rem; }
    .btn-danger    { background: transparent; color: var(--pink); font-size: 0.6875rem; margin-top: 0.25rem; }

    /* Importe grande */
    .amount-display {
      text-align: center;
      padding: 0.5rem 0 1.5rem;
    }
    .amount-display-label {
      font-size: 0.5625rem; font-weight: var(--fw-b);
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 0.5rem;
    }
    .amount-display-value {
      font-size: 3rem; font-weight: var(--fw-b);
      color: var(--text); letter-spacing: -0.05em; line-height: 1;
    }

    /* Calculadora */
    .calc-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem; margin-bottom: 1.25rem;
    }
    .calc-btn {
      padding: 1.125rem 0;
      border-radius: var(--r-lg);
      background: var(--bg-muted);
      border: none; cursor: pointer;
      font-family: var(--font);
      font-size: 1.25rem; font-weight: var(--fw-s);
      color: var(--text);
      transition: background 100ms ease, transform 100ms ease;
    }
    .calc-btn:active { background: var(--border); transform: scale(0.96); }
    .calc-btn.calc-clear { color: var(--pink); }
    .calc-btn svg { width: 18px; height: 18px; margin: 0 auto; display: block; }

    /* Separador */
    .divider { height: 1px; background: var(--border); margin: 1rem 0; }

    /* Animación de entrada de cards */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .budget-card { animation: cardIn 400ms var(--ease-out) both; }

    /* ── PANTALLA DETALLE ── */
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(24px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .detail-screen { animation: slideIn 350ms var(--ease-out) both; display: flex; flex-direction: column; flex: 1; min-height: 0; }

    /* Header detalle — usa el color del presupuesto */
    .detail-header {
      padding: 1.5rem 1.25rem 1.75rem;
      padding-top: calc(1.5rem + env(safe-area-inset-top));
      border-radius: 0 0 var(--r-xl) var(--r-xl);
      display: flex; flex-direction: column; gap: 1rem;
    }
    .detail-header-top {
      display: flex; align-items: center; justify-content: space-between;
    }
    .btn-back {
      width: 2.25rem; height: 2.25rem;
      border-radius: var(--r-full);
      background: rgba(255,255,255,0.20);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-inv);
      transition: background 150ms ease;
      flex-shrink: 0;
    }
    .btn-back:hover  { background: rgba(255,255,255,0.30); }
    .btn-back:active { transform: scale(0.94); }
    .btn-back svg { width: 18px; height: 18px; }

    .detail-header-name {

const BudgetCard = ({ item, onEdit, onOpen, style }) => {
  const palette = PALETTE.find(p => p.id === item.color) || PALETTE[1];
  const isDark = palette.dark;
  const spent = item.plans
    ? item.plans.reduce((s, p) => s + p.movs.reduce((a, m) => a + m.amount, 0), 0)
      + (item.directMovs || []).reduce((a, m) => a + m.amount, 0)
    : item.spent;
  const pct = Math.min(100, Math.round((spent / item.budget) * 100));

  return (
    <div
      className={`budget-card ${isDark ? 'on-dark' : 'on-light'}`}
      style={{ background: palette.hex, animationDelay: style?.delay || '0ms' }}
      onClick={() => onOpen(item)}
    >
      <div className={`card-icon ${isDark ? 'icon-on-dark' : 'icon-on-light'}`}>
        {ICONS[item.icon] || ICONS.star}
      </div>
      <div className="card-body">
        <div className="card-name">{item.name}</div>
        <div className="card-sub">Resta {fmt(item.budget - spent)}</div>
        <div className="card-progress-bg">
          <div className="card-progress-fill" style={{ width: `${pct}%` }} />
        </div>
      </div>
      <div className="card-right">
        <div className="card-amount">{fmt(item.budget)}</div>

/* ── PANTALLA DETALLE ── */
const fmtDate = (d) => {
  const [y, m, day] = d.split('-');
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
};

const DetailScreen = ({ budget, year, onBack, onEditBudget, onAddGasto, onEditGasto, onOpenPlan, onAddPlan, onEditPlan }) => {
  const palette   = PALETTE.find(p => p.id === budget.color) || PALETTE[1];
  const isDark    = palette.dark;
  const iconColor = isDark ? '#FFFFFF' : '#0D0D55';
  const iconBg    = palette.hex + '33';
  const progressColor = palette.hex;

  const totalSpent = budget.plans.reduce((s, p) => s + p.movs.reduce((a, m) => a + m.amount, 0), 0)
    + (budget.directMovs || []).reduce((a, m) => a + m.amount, 0);
  const resta = budget.budget - totalSpent;
  const pct   = Math.min(100, Math.round((totalSpent / budget.budget) * 100));

  // Suma de presupuestos de planificaciones vs presupuesto padre
  const totalPlanned  = budget.plans.reduce((s, p) => s + p.budget, 0);
  const planOverflow  = totalPlanned > budget.budget;

  // Sin planificaciones y con gastos directos → ir directo a GastosScreen
  // Si está vacío, se queda en DetailScreen para poder elegir entre planificación o gasto
  const hasPlans = (budget.plans || []).length > 0;
  const hasDirectMovs = (budget.directMovs || []).length > 0;

  if (!hasPlans && hasDirectMovs) {
    const fakePlan = { id: null, name: budget.name, budget: budget.budget, movs: budget.directMovs || [] };
    return (
      <GastosScreen
        budget={budget}
        plan={fakePlan}
        isDirectMode={true}
        onBack={onBack}
        onAddGasto={onAddGasto}
        onEditGasto={onEditGasto}
      />
    );
  }

  return (
    <div className="detail-screen">

      {/* HEADER DETALLE — fondo color del presupuesto */}
      <div className="detail-header" style={{ background: palette.hex }}>
        <div className="detail-header-top">
          <button className="btn-back"
            style={!isDark ? { background: 'rgba(13,13,85,0.10)', color: 'var(--navy)' } : {}}
            onClick={onBack}>
            <BackIcon />
          </button>
          <span className="detail-header-name"
            style={!isDark ? { color: 'var(--navy)' } : {}}>
            {budget.name}
          </span>
          <button className="detail-edit-btn"
            style={!isDark ? { color: 'var(--navy)', background: 'rgba(13,13,85,0.10)' } : {}}
            onClick={() => onEditBudget(budget)}>
            <PencilIcon />
          </button>
        </div>

        <div className={`detail-balance${!isDark ? ' on-light' : ''}`}>
          <div className="balance-item">
            <span className="balance-label">Total</span>
            <span className="balance-value">{fmt(budget.budget)}</span>
          </div>
          <div className="balance-item">
            <span className="balance-label">Gastado</span>
            <span className="balance-value">{fmt(totalSpent)}</span>
          </div>
          <div className="balance-item">
            {planOverflow ? (
              <>
                <span className="balance-label">Exceso planificado</span>
                <span className="balance-value-big">{fmt(resta)}</span>
                <div className="plan-overflow-badge">
                  ▲ {fmt(totalPlanned - budget.budget)} sobre presupuesto
                </div>
              </>
            ) : (
              <>
                <span className="balance-label">Disponible</span>
                <span className="balance-value-big">{fmt(resta)}</span>
              </>
            )}
            <div className="detail-progress-bg">
              <div className="detail-progress-fill" style={{
                width: `${pct}%`,
                background: isDark ? 'rgba(255,255,255,0.75)' : 'rgba(13,13,85,0.4)'
              }} />
            </div>
          </div>
        </div>
      </div>

      {/* CONTENIDO */}
      <div className="detail-content">

        {/* PLANIFICACIONES */}
        {budget.plans.length > 0 && (
          <>
            <div className="section-label">Planificaciones</div>
            {budget.plans.map(plan => {
              const planSpent = plan.movs.reduce((a, m) => a + m.amount, 0);
              const planPct   = Math.min(100, Math.round((planSpent / plan.budget) * 100));
              const danger    = planSpent > plan.budget;
              const margen    = plan.budget - planSpent;
              return (
                <div key={plan.id} className="plan-card" style={{ cursor:'pointer' }}
                  onClick={() => onOpenPlan(plan)}>
                  <div className="plan-icon" style={{ background: palette.hex, color: iconColor }}>
                    {ICONS[plan.icon] || ICONS[budget.icon] || ICONS.star}
                  </div>
                  <div className="plan-body">
                    <div className="plan-name">{plan.name}</div>
                    <div className="plan-sub">
                      {plan.movs.length} movimiento{plan.movs.length !== 1 ? 's' : ''}
                      {' · '}
                      {danger
                        ? <span className="plan-sub-overflow">+{fmt(Math.abs(margen))} excedido</span>
                        : <span>Margen {fmt(margen)}</span>
                      }
                    </div>
                    <div className="plan-progress-bg">
                      <div className="plan-progress-fill"
                        style={{ width: `${Math.min(100, planPct)}%`, background: progressColor }}
                      />
                    </div>
                  </div>
                  <div className="plan-right">
                    <span className="plan-amount">{fmt(plan.budget)}</span>
                    <button className="plan-edit" onClick={e => { e.stopPropagation(); onEditPlan(plan); }}><PencilIcon /></button>
                  </div>
                </div>
              );
            })}
          </>
        )}

        {/* 3. GASTOS DIRECTOS — agrupados por fecha */}
        {(budget.directMovs || []).length > 0 && (() => {
          // Ordenar por fecha desc y agrupar
          const sorted = [...budget.directMovs].sort((a, b) => b.date.localeCompare(a.date));
          const groups = [];
          sorted.forEach(mov => {
            const last = groups[groups.length - 1];
            if (last && last.date === mov.date) { last.movs.push(mov); }
            else { groups.push({ date: mov.date, movs: [mov] }); }
          });
          return (
            <>
              <div className="section-label" style={{ marginTop: budget.plans.length > 0 ? '0.5rem' : 0 }}>
                Gastos directos
              </div>
              {groups.map(group => (
                <div key={group.date} className="date-group">
                  {/* Separador de fecha */}
                  <div className="date-separator">
                    <span className="date-sep-label">{fmtDate(group.date)}</span>
                    <span className="date-sep-total">-{fmt(group.movs.reduce((s, m) => s + m.amount, 0))}</span>
                  </div>
                  {/* Cards del grupo */}
                  {group.movs.map(mov => (
                    <div key={mov.id} className="plan-card" style={{ marginBottom: '0.5rem' }}>
                      <div className="plan-icon" style={{ background: palette.hex, color: iconColor }}>
                        {ICONS[mov.icon] || ICONS[budget.icon] || ICONS.star}
                      </div>
                      <div className="plan-body">
                        <div className="plan-name">{mov.name}</div>
                        <div className="mov-category">{mov.category || '—'}</div>
                      </div>
                      <div className="plan-right">
                        <span className="plan-amount">{fmt(mov.amount)}</span>
                        <button className="plan-edit" onClick={() => onEditGasto(mov)}><PencilIcon /></button>
                      </div>
                    </div>
                  ))}
                </div>
              ))}
            </>
          );
        })()}

        {/* VACÍO */}
        {budget.plans.length === 0 && (budget.directMovs || []).length === 0 && (
          <div className="empty-state">
            <div className="empty-icon" style={{ background: iconBg }}>
              <span style={{ color: iconColor }}>{ICONS[budget.icon]}</span>
            </div>
            <div className="empty-title">Sin movimientos aún</div>
            <div className="empty-sub">Añade una planificación para organizar los gastos, o registra un gasto directo.</div>
          </div>
        )}
      </div>

      {/* FOOTER */}
      <div className="detail-footer">
        {(!hasPlans && !hasDirectMovs) ? (
          <>
            <span className="detail-footer-label">Añadir</span>
            <div className="detail-footer-btns">
              <button className="btn btn-outline" onClick={onAddPlan}>Planificación</button>
              <button className="btn btn-primary" onClick={onAddGasto}>Gasto</button>
            </div>
          </>
        ) : (
          <>
            <button className="btn-add" onClick={onAddPlan}><PlusIcon /></button>
            <span className="btn-add-label">Añadir planificación</span>
          </>
        )}
      </div>
    </div>
  );
};

/* ── UTILS FECHA ── */
const todayStr = () => {

  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const yesterdayStr = () => {
  const d = new Date(); d.setDate(d.getDate()-1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

/* ── MODAL GASTO ── */
const ModalGasto = ({ budget, mov: editMov, onSave, onDelete, onClose }) => {
  const isEdit   = !!editMov;
  const palette  = PALETTE.find(p => p.id === budget.color) || PALETTE[1];
  const [step, setStep]     = useState('importe');
  const [amount, setAmount] = useState(isEdit ? String(editMov.amount) : '0');
  const [name, setName]     = useState(isEdit ? editMov.name : '');
  const [date, setDate]     = useState(isEdit ? editMov.date : todayStr());
  const [customDate, setCustomDate] = useState(isEdit);
  const [icon, setIcon]         = useState(isEdit ? editMov.icon : (ICON_GROUPS.find(g => g.label === (ICON_CONTEXT[budget.icon] || 'Otros'))?.keys[0] || 'star'));
  const [category, setCategory] = useState(isEdit ? (editMov.category || 'Hogar') : (ICON_CONTEXT[budget.icon] || 'Otros'));
  const [confirmDelete, setConfirmDelete] = useState(false);

  const pressCalc = (n) => setAmount(prev => prev === '0' ? String(n) : prev.length > 8 ? prev : prev + n);
  const backCalc  = () => setAmount(prev => prev.length <= 1 ? '0' : prev.slice(0, -1));

  const handleSave = () => {
    onSave({
      id: isEdit ? editMov.id : Date.now(),
      name: name || 'Sin nombre',
      amount: parseInt(amount) || 0,
      date,
      icon,
      category,
      color: budget.color,
    });
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-sheet">

        {/* HEADER */}
        <div className="modal-header">
          <div className="modal-title">
            {step === 'importe'
              ? (isEdit ? 'Editar importe' : '¿Cuánto has gastado?')
              : (isEdit ? 'Editar gasto' : 'Detalle del gasto')}
          </div>
          <button className="modal-close" onClick={onClose}><CloseIcon /></button>
        </div>

        {/* CONTENT */}
        <div className="modal-content">
          {step === 'importe' && (
            <>

/* ── APP ── */
const App = () => {
  const [data, setData]         = useState(INITIAL_DATA);
  const [year, setYear]         = useState('2026');
  const [yearOpen, setYearOpen] = useState(false);
  const [exportOk, setExportOk] = useState(false);
  const [modal, setModal]           = useState(null);
  const [detail, setDetail]         = useState(null);
  const [planDetail, setPlanDetail] = useState(null);
  const [modalGasto, setModalGasto] = useState(false);
  const [editGasto, setEditGasto]   = useState(null);
  const [modalPlan, setModalPlan]   = useState(null); // null | 'new' | plan object

  const budgets     = data[year] || [];
  const isFirstTime = Object.values(data).every(arr => arr.length === 0);

  const yearRef = useRef(null);
  useEffect(() => {
    const handler = e => { if (yearRef.current && !yearRef.current.contains(e.target)) setYearOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const handleExport = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `MarGen_${year}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setExportOk(true);
    setTimeout(() => setExportOk(false), 2000);
  };

  const handleSave = (item) => {
    setData(prev => {
      const list = prev[year] || [];
      const exists = list.find(b => b.id === item.id);
      const updated = exists ? list.map(b => b.id === item.id ? item : b) : [...list, item];
      return { ...prev, [year]: updated };
    });
    // Si editamos desde el detalle, actualizamos detail también
    if (detail && item.id === detail.id) setDetail(item);
    setModal(null);
  };

  const handleDelete = (id) => {
    setData(prev => ({ ...prev, [year]: (prev[year] || []).filter(b => b.id !== id) }));
    setModal(null);
    setDetail(null);
  };

  const handleSaveGasto = (mov) => {
    setData(prev => {
      const list = prev[year] || [];
      const updated = list.map(b => {
        if (b.id !== detail.id) return b;
        return { ...b, directMovs: [...(b.directMovs || []), mov] };
      });
      return { ...prev, [year]: updated };
    });
    setModalGasto(false);
  };

  const handleUpdateGasto = (mov) => {
    setData(prev => {
      const list = prev[year] || [];
      const updated = list.map(b => {
        if (b.id !== detail.id) return b;
        return { ...b, directMovs: (b.directMovs || []).map(m => m.id === mov.id ? mov : m) };
      });
      return { ...prev, [year]: updated };
    });
    setEditGasto(null);
  };

  const handleDeleteGasto = (movId) => {
    setData(prev => {
      const list = prev[year] || [];
      const updated = list.map(b => {
        if (b.id !== detail.id) return b;
        return { ...b, directMovs: (b.directMovs || []).filter(m => m.id !== movId) };
      });
      return { ...prev, [year]: updated };
    });
    setEditGasto(null);
  };

  // Handlers para planificaciones
  const handleSavePlan = (plan) => {
    setData(prev => {
      const list = prev[year] || [];
      const updated = list.map(b => {
        if (b.id !== detail.id) return b;
        const exists = b.plans.find(p => p.id === plan.id);
        const plans = exists ? b.plans.map(p => p.id === plan.id ? plan : p) : [...b.plans, plan];
        return { ...b, plans };
      });
      return { ...prev, [year]: updated };
    });
    setModalPlan(null);
  };

  const handleDeletePlan = (planId) => {
    setData(prev => {
      const list = prev[year] || [];
      const updated = list.map(b => {
        if (b.id !== detail.id) return b;
        return { ...b, plans: b.plans.filter(p => p.id !== planId) };
      });
      return { ...prev, [year]: updated };
    });
    setModalPlan(null);
  };

  // Handlers para gastos DENTRO de planificación
  const handleSavePlanGasto = (mov) => {
    setData(prev => {
      const list = prev[year] || [];
      const updated = list.map(b => {
        if (b.id !== detail.id) return b;
        return { ...b, plans: b.plans.map(p =>
          p.id !== planDetail.id ? p : { ...p, movs: [...p.movs, mov] }
        )};
      });
      return { ...prev, [year]: updated };
    });
    // Sincronizar planDetail
    setPlanDetail(prev => ({ ...prev, movs: [...prev.movs, mov] }));
    setModalGasto(false);
  };

  const handleUpdatePlanGasto = (mov) => {
    setData(prev => {
      const list = prev[year] || [];
      const updated = list.map(b => {
        if (b.id !== detail.id) return b;
        return { ...b, plans: b.plans.map(p =>
          p.id !== planDetail.id ? p : { ...p, movs: p.movs.map(m => m.id === mov.id ? mov : m) }
        )};
      });
      return { ...prev, [year]: updated };
    });
    setPlanDetail(prev => ({ ...prev, movs: prev.movs.map(m => m.id === mov.id ? mov : m) }));
    setEditGasto(null);
  };

  const handleDeletePlanGasto = (movId) => {
    setData(prev => {
      const list = prev[year] || [];
      const updated = list.map(b => {
        if (b.id !== detail.id) return b;
        return { ...b, plans: b.plans.map(p =>
          p.id !== planDetail.id ? p : { ...p, movs: p.movs.filter(m => m.id !== movId) }
        )};
      });
      return { ...prev, [year]: updated };
    });
    setPlanDetail(prev => ({ ...prev, movs: prev.movs.filter(m => m.id !== movId) }));
    setEditGasto(null);
  };

  // PANTALLA GASTOS — dentro de una planificación
  if (planDetail && detail) {
    const liveBudget = (data[year] || []).find(b => b.id === detail.id) || detail;
    return (
      <div className="app-shell">
        <GastosScreen
          budget={liveBudget}
          plan={planDetail}
          onBack={() => setPlanDetail(null)}
          onAddGasto={() => setModalGasto(true)}
          onEditGasto={mov => setEditGasto(mov)}
        />
        {modalGasto && (
          <ModalGasto
            budget={liveBudget}
            onSave={handleSavePlanGasto}
            onClose={() => setModalGasto(false)}
          />
        )}
        {editGasto && (
          <ModalGasto
            budget={liveBudget}
            mov={editGasto}
            onSave={handleUpdatePlanGasto}
            onDelete={handleDeletePlanGasto}
            onClose={() => setEditGasto(null)}
          />
        )}
      </div>
    );
  }

  // Si hay pantalla de detalle abierta, renderizamos esa
  if (detail) {
    // Sincronizamos con data por si se editó
    const live = (data[year] || []).find(b => b.id === detail.id) || detail;
    return (
      <div className="app-shell">
        <DetailScreen
          budget={live}
          year={year}
          onBack={() => setDetail(null)}
          onEditBudget={item => setModal(item)}
          onAddGasto={() => setModalGasto(true)}
          onEditGasto={mov => setEditGasto(mov)}
          onOpenPlan={plan => setPlanDetail(plan)}
          onAddPlan={() => setModalPlan('new')}
          onEditPlan={plan => setModalPlan(plan)}
        />
        {modalGasto && (
          <ModalGasto
            budget={live}
            onSave={handleSaveGasto}
            onClose={() => setModalGasto(false)}
          />
        )}
        {editGasto && (
          <ModalGasto
            budget={live}
            mov={editGasto}
            onSave={handleUpdateGasto}
            onDelete={handleDeleteGasto}
            onClose={() => setEditGasto(null)}
          />
        )}
        {modalPlan && (
          <ModalPlan
            plan={modalPlan === 'new' ? null : modalPlan}
            budget={live}
            onSave={handleSavePlan}
            onDelete={handleDeletePlan}
            onClose={() => setModalPlan(null)}
          />
        )}
        {modal && (
          <ModalPresupuesto
            item={modal === 'new' ? null : modal}
            onSave={handleSave}
            onDelete={handleDelete}
            onClose={() => setModal(null)}
          />
        )}
      </div>
    );
  }

  // Primera vez — welcome a pantalla completa sin header ni footer
  if (isFirstTime) {
    return (
      <div className="app-shell">
        <div className="content content-welcome">
          <div className="welcome-screen">
            <div className="welcome-top">
              <div className="w-shape w-s1"></div>
              <div className="w-shape w-s2"></div>
              <div className="w-shape w-s3"></div>
              <div className="w-shape w-s4"></div>
              <div className="w-shape w-s5"></div>
              <div className="welcome-logo-nav">
                <span className="wl-m">Mar</span><span className="wl-g">Gen</span>
              </div>
              <svg className="welcome-wave" viewBox="0 0 390 48" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M0,0 L0,24 C100,48 290,0 390,24 L390,48 L0,48 Z" fill="#ffffff"/>
              </svg>
            </div>
            <div className="welcome-bottom">
              <div className="welcome-bottom-text">
                <div className="welcome-w-line"></div>
                <div className="welcome-w-title">Bienvenido<br/>a MarGen</div>
                <div className="welcome-w-sub">Tu app para planificar y controlar presupuestos. Crea tu primer presupuesto y empieza a tener el control.</div>
              </div>
              <div className="welcome-bottom-cta">
                <button className="btn-add" onClick={() => setModal('new')}><PlusIcon /></button>
                <span className="btn-add-label">Crear presupuesto</span>
              </div>
            </div>
          </div>
        </div>
        {modal && (
          <ModalPresupuesto
            item={null}
            onSave={handleSave}
            onDelete={handleDelete}
            onClose={() => setModal(null)}
          />
        )}
      </div>
    );
  }

  return (
    <div className="app-shell">
      <header className="header">
        <div className="year-selector" ref={yearRef}>
          <div className="year-pill" onClick={() => setYearOpen(o => !o)}>
            <span className="year-number">{year}</span>
            <span className={`year-chevron ${yearOpen ? 'open' : ''}`}><ChevronDown /></span>
          </div>
          {yearOpen && (
            <div className="year-dropdown">
              {YEARS.map(y => (
                <div key={y} className={`year-option ${y === year ? 'active' : ''}`}
                  onClick={() => { setYear(y); setYearOpen(false); }}>
                  <span>{y}</span>
                  {y === year && <span className="year-check"><CheckIcon /></span>}
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="header-actions">
          <button className={`icon-btn ${exportOk ? 'success' : ''}`} onClick={handleExport}>
            {exportOk ? <CheckIcon /> : <DownloadIcon />}
          </button>
        </div>
      </header>

      <div className="content">
        {budgets.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon"><WalletIcon /></div>
            <div className="empty-title">Sin presupuestos en {year}</div>
            <div className="empty-sub">Pulsa el botón + para añadir un presupuesto en {year}.</div>
          </div>
        ) : (
          budgets.map((b, i) => (
            <BudgetCard key={b.id} item={b}
              onOpen={item => setDetail(item)}
              onEdit={item => setModal(item)}
              style={{ delay: `${i * 60}ms` }} />
          ))
        )}
      </div>

      <div className="footer">
        <button className="btn-add" onClick={() => setModal('new')}><PlusIcon /></button>
        <span className="btn-add-label">Añadir</span>
      </div>

      {modal && (
        <ModalPresupuesto
          item={modal === 'new' ? null : modal}
          onSave={handleSave}
          onDelete={handleDelete}
          onClose={() => setModal(null)}
        />
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Re-trigger Phosphor icon rendering after React mounts
setTimeout(() => {
  if (window.PhosphorIcons) window.PhosphorIcons.replace();
}, 100);
</script>
</body>
</html>
